<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enter Details</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:linear-gradient(180deg,#2b0033,#1a001f);
  color:white;
}

/* BACKGROUND IMAGE */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  background:url('https://images.unsplash.com/photo-1504198266285-165a3d8c7c5b');
  background-size:cover;
  background-position:center;
  opacity:0.2;
  z-index:-1;
}

/* CONTAINER */
.container{
  padding:20px;
}

/* TITLE */
h2{
  margin-bottom:20px;
  font-weight:500;
}

/* INPUT */
.input-box{
  margin-bottom:15px;
}

input, select{
  width:100%;
  padding:15px;
  border-radius:12px;
  border:1px solid rgba(255,215,0,0.6);
  background:rgba(255,255,255,0.05);
  color:white;
  font-size:14px;
}

/* DATE STYLE */
input[type="date"]{
  color:#ccc;
}

/* BUTTON */
.btn{
  width:100%;
  padding:16px;
  background:linear-gradient(90deg,#ffb347,#ffcc33);
  border:none;
  border-radius:12px;
  font-size:16px;
  font-weight:600;
  color:black;
  margin-top:10px;
}

/* LABEL */
label{
  font-size:13px;
  color:#ccc;
  margin-bottom:5px;
  display:block;
}
</style>

</head>

<body>

<div class="bg"></div>

<div class="container">

<h2>Enter your details to talk to astrologer</h2>

<form onsubmit="saveData(); return false;">

<div class="input-box">
<label>Your Full Name</label>
<input type="text" id="name" placeholder="Enter your full name" required>
</div>

<div class="input-box">
<label>State of Birth</label>
<select id="state" required>
<option value="">Select State</option>
<option>Bihar</option>
<option>UP</option>
<option>Delhi</option>
<option>Maharashtra</option>
</select>
</div>

<div class="input-box">
<label>City of Birth</label>
<input type="text" id="city" placeholder="Enter your city" required>
</div>

<div class="input-box">
<label>Date of Birth</label>
<input type="date" id="dob" required>
</div>

<button class="btn" type="submit">
Continue to Payment
</button>

</form>

</div>

<script>
function saveData(){
  localStorage.setItem("name", document.getElementById("name").value);
  localStorage.setItem("city", document.getElementById("city").value);
  localStorage.setItem("state", document.getElementById("state").value);
  localStorage.setItem("dob", document.getElementById("dob").value);

  window.location.href="payment.html";
}
</script>

</body>
</html>
